name: test-addon-version

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate add-on and pinned image versions
        run: |
          set -euo pipefail

          config_version=$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' trek/config.yaml | head -n1 || true)
          amd64_tag=$(sed -nE 's#^[[:space:]]*amd64:[[:space:]]*"?mauriceboe/trek:([^"[:space:]]+)"?[[:space:]]*$#\1#p' trek/build.yaml | head -n1 || true)
          aarch64_tag=$(sed -nE 's#^[[:space:]]*aarch64:[[:space:]]*"?mauriceboe/trek:([^"[:space:]]+)"?[[:space:]]*$#\1#p' trek/build.yaml | head -n1 || true)

          if [ -z "$config_version" ] || [ -z "$amd64_tag" ] || [ -z "$aarch64_tag" ]; then
            echo "Version parsing failed. Check trek/config.yaml and trek/build.yaml formats."
            echo "config_version='${config_version:-}'"
            echo "amd64_tag='${amd64_tag:-}'"
            echo "aarch64_tag='${aarch64_tag:-}'"
            exit 1
          fi

          if [ "$amd64_tag" = "latest" ] || [ "$aarch64_tag" = "latest" ]; then
            echo "Image tags must be pinned to a specific TREK release, not 'latest'."
            exit 1
          fi

          if [ "$amd64_tag" != "$aarch64_tag" ]; then
            echo "Pinned image tag mismatch detected between architectures."
            echo "amd64 tag: $amd64_tag"
            echo "aarch64 tag: $aarch64_tag"
            exit 1
          fi

          echo "Validation passed. addon version=$config_version, pinned TREK tag=$amd64_tag"
